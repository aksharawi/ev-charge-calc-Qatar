<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ChargeCalc" />
  <meta name="theme-color" content="#F5C518" />
  <title>EV Charge Calculator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      background: #0d0d0d;
      color: #fff;
      font-family: 'DM Mono', 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
    }
    body { overflow-x: hidden; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 0; height: 0; }
    select { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const CHARGERS = [
      { id: "wall", label: "Wall Plug", sub: "Mode 2 · 2.2 kW", kw: 2.2, icon: "🔌" },
      { id: "ac11", label: "AC Charger", sub: "Type 2 · 11 kW", kw: 11, icon: "⚡" },
    ];

    const RATES = [
      { label: "Residential Flat", value: 0.08 },
      { label: "Villa (low)", value: 0.08 },
      { label: "Villa (high)", value: 0.10 },
      { label: "Commercial (low)", value: 0.09 },
      { label: "Commercial (mid)", value: 0.12 },
      { label: "Commercial (high)", value: 0.14 },
      { label: "Custom", value: null },
    ];

    function Slider({ label, value, min, max, step, unit, onChange, accent = "#F5C518" }) {
      const [inputVal, setInputVal] = React.useState(String(value));
      const pct = ((value - min) / (max - min)) * 100;

      // Keep local input in sync when value changes externally
      React.useEffect(() => { setInputVal(String(value)); }, [value]);

      const handleInputChange = (e) => {
        setInputVal(e.target.value);
      };

      const handleInputBlur = () => {
        const parsed = parseFloat(inputVal);
        if (!isNaN(parsed)) {
          const clamped = Math.min(max, Math.max(min, parsed));
          onChange(clamped);
          setInputVal(String(clamped));
        } else {
          setInputVal(String(value));
        }
      };

      const handleInputKey = (e) => {
        if (e.key === "Enter") e.target.blur();
      };

      return (
        <div style={{ marginBottom: "1.4rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
            <span style={{ fontSize: "0.72rem", color: "#666", letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</span>
            <div style={{ display: "flex", alignItems: "center", gap: "0.2rem" }}>
              <input
                type="number"
                value={inputVal}
                min={min} max={max} step={step}
                onChange={handleInputChange}
                onBlur={handleInputBlur}
                onKeyDown={handleInputKey}
                style={{
                  width: unit === " kWh" ? "60px" : "48px",
                  background: "#1a1a1a",
                  border: `1px solid ${accent}40`,
                  borderRadius: "6px",
                  padding: "0.2rem 0.4rem",
                  color: "#fff",
                  fontFamily: "'DM Mono', monospace",
                  fontSize: "0.88rem",
                  fontWeight: 700,
                  textAlign: "right",
                  outline: "none",
                }}
              />
              <span style={{ fontSize: "0.78rem", color: "#555", minWidth: "24px" }}>{unit.trim()}</span>
            </div>
          </div>
          <div style={{ position: "relative", height: "5px", background: "#222", borderRadius: "3px" }}>
            <div style={{
              position: "absolute", left: 0, top: 0, height: "100%",
              width: `${pct}%`, background: accent, borderRadius: "3px",
              transition: "width 0.1s"
            }} />
            <input type="range" min={min} max={max} step={step} value={value}
              onChange={e => onChange(Number(e.target.value))}
              style={{
                position: "absolute", top: "-8px", left: 0,
                width: "100%", height: "22px", opacity: 0,
                cursor: "pointer", zIndex: 2
              }} />
            <div style={{
              position: "absolute", top: "50%", left: `${pct}%`,
              transform: "translate(-50%, -50%)",
              width: "15px", height: "15px",
              background: accent, borderRadius: "50%",
              border: "2px solid #0d0d0d",
              boxShadow: `0 0 10px ${accent}60`,
              transition: "left 0.1s", pointerEvents: "none"
            }} />
          </div>
        </div>
      );
    }

    function Section({ title, children }) {
      return (
        <div style={{ background: "#111", borderRadius: "14px", padding: "1.4rem", marginBottom: "0.75rem" }}>
          <div style={{ fontSize: "0.65rem", color: "#444", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "1.2rem" }}>{title}</div>
          {children}
        </div>
      );
    }

    function App() {
      const [battery, setBattery] = useState(31.8);
      const [startSOC, setStartSOC] = useState(20);
      const [endSOC, setEndSOC] = useState(100);
      const [efficiency, setEfficiency] = useState(85);
      const [rate, setRate] = useState(0.12);
      const [customRate, setCustomRate] = useState(false);
      const [freqDays, setFreqDays] = useState(3);
      const [chargerId, setChargerId] = useState("wall");

      const charger = CHARGERS.find(c => c.id === chargerId);
      const chargePct = endSOC - startSOC;
      const energyToBattery = (battery * chargePct) / 100;
      const energyFromWall = energyToBattery / (efficiency / 100);
      const costPerCharge = energyFromWall * rate;
      const chargesPerMonth = Math.round(30 / freqDays);
      const monthlyCost = costPerCharge * chargesPerMonth;
      const annualCost = monthlyCost * 12;
      const chargingHours = energyFromWall / charger.kw;
      const chargingTime = chargingHours < 1
        ? `~${Math.round(chargingHours * 60)} min`
        : `~${chargingHours.toFixed(1)} hrs`;

      return (
        <div style={{ minHeight: "100vh", padding: "env(safe-area-inset-top, 1rem) 1rem 2rem", maxWidth: "460px", margin: "0 auto" }}>

          {/* Header */}
          <div style={{ paddingTop: "1.2rem", marginBottom: "1.8rem" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.7rem", marginBottom: "0.2rem" }}>
              <div style={{
                width: "32px", height: "32px", background: "#F5C518",
                borderRadius: "8px", display: "flex", alignItems: "center",
                justifyContent: "center", fontSize: "16px", flexShrink: 0
              }}>⚡</div>
              <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "1.7rem", letterSpacing: "0.06em", color: "#F5C518" }}>
                CHARGE CALC
              </span>
            </div>
            <div style={{ fontSize: "0.65rem", color: "#333", letterSpacing: "0.08em", paddingLeft: "2.6rem" }}>
              DENZA B5 · KAHRAMAA QATAR
            </div>
          </div>

          {/* Result Cards */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.6rem", marginBottom: "1.5rem" }}>
            {/* Big card */}
            <div style={{
              gridColumn: "1 / -1",
              background: "linear-gradient(135deg, #1a1500 0%, #111 60%)",
              border: "1px solid #F5C51830",
              borderRadius: "14px", padding: "1.4rem 1.5rem",
              position: "relative", overflow: "hidden"
            }}>
              <div style={{
                position: "absolute", top: 0, left: 0, right: 0, height: "2px",
                background: "linear-gradient(90deg, transparent, #F5C518, transparent)"
              }} />
              <div style={{ fontSize: "0.65rem", color: "#666", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.3rem" }}>Cost per Charge</div>
              <div style={{ fontSize: "2.2rem", fontWeight: 800, color: "#F5C518", lineHeight: 1, marginBottom: "0.4rem" }}>
                QAR {costPerCharge.toFixed(2)}
              </div>
              <div style={{ fontSize: "0.72rem", color: "#555" }}>
                {energyFromWall.toFixed(1)} kWh from wall · {chargingTime} · {chargePct}% charged
              </div>
            </div>

            {[
              { label: "Monthly", value: `QAR ${monthlyCost.toFixed(1)}`, sub: `${chargesPerMonth}× charges`, accent: "#4ade80" },
              { label: "Annual", value: `QAR ${annualCost.toFixed(0)}`, sub: "estimated", accent: "#60a5fa" },
            ].map(card => (
              <div key={card.label} style={{
                background: "#111",
                border: `1px solid ${card.accent}18`,
                borderRadius: "14px", padding: "1rem 1.1rem",
                position: "relative", overflow: "hidden", textAlign: "center"
              }}>
                <div style={{
                  position: "absolute", top: 0, left: 0, right: 0, height: "2px",
                  background: `linear-gradient(90deg, transparent, ${card.accent}, transparent)`
                }} />
                <div style={{ fontSize: "0.65rem", color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.3rem" }}>{card.label}</div>
                <div style={{ fontSize: "1.35rem", fontWeight: 800, color: card.accent, lineHeight: 1 }}>{card.value}</div>
                <div style={{ fontSize: "0.68rem", color: "#444", marginTop: "0.25rem" }}>{card.sub}</div>
              </div>
            ))}
          </div>

          {/* Charger Type Toggle */}
          <Section title="Charger Type">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.6rem" }}>
              {CHARGERS.map(c => {
                const active = chargerId === c.id;
                return (
                  <button key={c.id} onClick={() => setChargerId(c.id)} style={{
                    background: active ? "#1a1500" : "#161616",
                    border: `1.5px solid ${active ? "#F5C518" : "#222"}`,
                    borderRadius: "10px", padding: "0.85rem 0.8rem",
                    cursor: "pointer", textAlign: "left",
                    transition: "all 0.15s",
                  }}>
                    <div style={{ fontSize: "1.3rem", marginBottom: "0.3rem" }}>{c.icon}</div>
                    <div style={{ fontSize: "0.8rem", fontWeight: 700, color: active ? "#F5C518" : "#aaa", fontFamily: "'DM Mono', monospace" }}>{c.label}</div>
                    <div style={{ fontSize: "0.65rem", color: active ? "#F5C51880" : "#444", marginTop: "0.15rem" }}>{c.sub}</div>
                  </button>
                );
              })}
            </div>
          </Section>

          {/* Battery */}
          <Section title="Battery">
            <Slider label="Capacity" value={battery} min={10} max={100} step={0.1} unit=" kWh" onChange={setBattery} />
            <Slider label="Start SOC" value={startSOC} min={0} max={99} step={1} unit="%" onChange={v => setStartSOC(Math.min(v, endSOC - 1))} accent="#f97316" />
            <Slider label="End SOC" value={endSOC} min={1} max={100} step={1} unit="%" onChange={v => setEndSOC(Math.max(v, startSOC + 1))} />
            <Slider label="Charger Efficiency" value={efficiency} min={70} max={100} step={1} unit="%" onChange={setEfficiency} accent="#a78bfa" />
          </Section>

          {/* Tariff */}
          <Section title="Kahramaa Tariff">
            <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem", marginBottom: "1rem" }}>
              {RATES.map(r => {
                const active = r.value !== null
                  ? !customRate && Math.abs(rate - r.value) < 0.001
                  : customRate;
                return (
                  <button key={r.label} onClick={() => {
                    if (r.value !== null) { setCustomRate(false); setRate(r.value); }
                    else setCustomRate(true);
                  }} style={{
                    padding: "0.3rem 0.55rem",
                    fontSize: "0.62rem",
                    letterSpacing: "0.04em",
                    background: active ? "#F5C518" : "#1a1a1a",
                    color: active ? "#000" : "#555",
                    border: `1px solid ${active ? "#F5C518" : "#252525"}`,
                    borderRadius: "6px",
                    cursor: "pointer",
                    fontFamily: "'DM Mono', monospace",
                    fontWeight: active ? 700 : 400,
                    transition: "all 0.15s",
                  }}>
                    {r.label}{r.value !== null ? ` (${r.value})` : ""}
                  </button>
                );
              })}
            </div>

            {customRate && (
              <div style={{ marginBottom: "1rem" }}>
                <div style={{ fontSize: "0.68rem", color: "#666", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "0.4rem" }}>Rate (QAR/kWh)</div>
                <input type="number" step="0.01" min="0.01" max="1" value={rate}
                  onChange={e => setRate(Number(e.target.value))}
                  style={{
                    width: "100%", background: "#1a1a1a",
                    border: "1px solid #2a2a2a", borderRadius: "8px",
                    padding: "0.6rem 0.8rem", color: "#fff",
                    fontFamily: "'DM Mono', monospace", fontSize: "1rem"
                  }} />
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "0.5rem" }}>
              <span style={{ fontSize: "0.65rem", color: "#444" }}>ACTIVE RATE</span>
              <span style={{ fontSize: "1.1rem", fontWeight: 700, color: "#F5C518" }}>QAR {rate.toFixed(3)} / kWh</span>
            </div>
          </Section>

          {/* Schedule */}
          <Section title="Charging Schedule">
            <Slider label="Charge Every" value={freqDays} min={1} max={14} step={1} unit=" days" onChange={setFreqDays} accent="#4ade80" />
            <div style={{ fontSize: "0.72rem", color: "#444", marginTop: "-0.8rem" }}>
              = {chargesPerMonth} charges per month
            </div>
          </Section>

          {/* Breakdown */}
          <Section title="Full Breakdown">
            {[
              ["Charge range", `${startSOC}% → ${endSOC}% (${chargePct}%)`],
              ["Energy to battery", `${energyToBattery.toFixed(2)} kWh`],
              ["Energy from wall", `${energyFromWall.toFixed(2)} kWh`],
              ["Charger", `${charger.label} (${charger.kw} kW)`],
              ["Est. charge time", chargingTime],
              ["Cost per charge", `QAR ${costPerCharge.toFixed(3)}`],
              ["Charges / month", `${chargesPerMonth}`],
              ["Monthly cost", `QAR ${monthlyCost.toFixed(2)}`],
              ["Annual cost", `QAR ${annualCost.toFixed(2)}`],
            ].map(([k, v]) => (
              <div key={k} style={{
                display: "flex", justifyContent: "space-between",
                padding: "0.5rem 0", borderBottom: "1px solid #1a1a1a"
              }}>
                <span style={{ fontSize: "0.72rem", color: "#444" }}>{k}</span>
                <span style={{ fontSize: "0.78rem", color: "#ccc", fontWeight: 500 }}>{v}</span>
              </div>
            ))}
          </Section>

          <div style={{ textAlign: "center", marginTop: "1.2rem", paddingBottom: "1rem" }}>
            <div style={{ fontSize: "0.6rem", color: "#2a2a2a", letterSpacing: "0.08em", marginBottom: "0.4rem" }}>
              WORKS OFFLINE · KAHRAMAA QATAR
            </div>
            <div style={{ fontSize: "0.65rem", color: "#333", letterSpacing: "0.05em" }}>
              Made by <span style={{ color: "#F5C518" }}>@aksharawi</span> · All rights reserved
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    // Register service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
