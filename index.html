    function Slider({ label, value, min, max, step, unit, onChange, accent, theme }) {
      const [inputVal, setInputVal] = useState(String(value));
      const pct = ((value - min) / (max - min)) * 100;
 
      useEffect(() => { setInputVal(String(value)); }, [value]);
 
      return (

                type="number" value={inputVal} min={min} max={max} step={step}
                onChange={e => setInputVal(e.target.value)}
                onBlur={() => {
                  const parsed = parseFloat(inputVal);
                  if (!isNaN(parsed)) { const c = Math.min(max, Math.max(min, parsed)); onChange(c); setInputVal(String(c)); }

              textAlign: isRTL ? "right" : "left",
            }}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: `linear-gradient(90deg, transparent, ${theme.yellow}, transparent)` }} />
              <div style={{ fontSize: "0.65rem", color: theme.textFaint, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "0.3rem" }}>{t.costPerCharge}</div>
              <div style={{ fontSize: "2.2rem", fontWeight: 800, color: theme.yellowText, lineHeight: 1, marginBottom: "0.4rem", fontFamily: "'DM Mono', monospace" }}>
                QAR {costPerCharge.toFixed(2)}
              </div>
              <div style={{ fontSize: "0.72rem", color: theme.textMuted, fontFamily: "'DM Mono', monospace" }}>
                {energyFromWall.toFixed(1)} kWh {t.fromWall} · {chargingTime} · {chargePct}% {t.charged}
              </div>
            </div>
 
            {[
              { label: t.monthly, value: `QAR ${monthlyCost.toFixed(1)}`, sub: `${chargesPerMonth} ${t.charges}`, accent: theme.green },
              { label: t.annual, value: `QAR ${annualCost.toFixed(0)}`, sub: t.estimated, accent: theme.blue },
            ].map(card => (
              <div key={card.label} style={{
                background: theme.cardBg,
                border: `1px solid ${alpha(card.accent, isDark ? 0.1 : 0.2)}`,
                boxShadow: theme.cardShadow,
                borderRadius: "14px", padding: "1rem 1.1rem",
                position: "relative", overflow: "hidden", textAlign: "center"
              }}>
                <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: `linear-gradient(90deg, transparent, ${card.accent}, transparent)` }} />
                <div style={{ fontSize: "0.65rem", color: theme.textFaint, letterSpacing: "0.08em", marginBottom: "0.3rem" }}>{card.label}</div>
                <div style={{ fontSize: "1.35rem", fontWeight: 800, color: card.accent, lineHeight: 1, fontFamily: "'DM Mono', monospace" }}>{card.value}</div>
                <div style={{ fontSize: "0.68rem", color: theme.textVeryFaint, marginTop: "0.25rem" }}>{card.sub}</div>
              </div>
            ))}
          </div>
 
          {/* Charger Type */}
          <Section title={t.chargerType} isRTL={isRTL} theme={theme}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.6rem" }}>
              {CHARGERS.map(c => {
                const active = chargerId === c.id;
                return (
                  <button key={c.id} onClick={() => setChargerId(c.id)} style={{
                    background: active ? theme.chargerCardActive : theme.chargerCardInactive,
                    border: `1.5px solid ${active ? theme.borderActive : theme.border}`,
                    borderRadius: "10px", padding: "0.85rem 0.8rem",
                    cursor: "pointer", textAlign: isRTL ? "right" : "left",
                    transition: "all 0.15s", fontFamily: t.fontFamily,
                  }}>
                    <div style={{ fontSize: "1.3rem", marginBottom: "0.3rem" }}>{c.icon}</div>
                    <div style={{ fontSize: "0.82rem", fontWeight: 700, color: active ? theme.yellowText : theme.textMuted }}>{c.label}</div>
                    <div style={{ fontSize: "0.63rem", color: active ? alpha(theme.yellowText, 0.6) : theme.textFaint, marginTop: "0.15rem", fontFamily: "'DM Mono', monospace" }}>{c.sub}</div>
                  </button>
                );
              })}
            </div>
          </Section>
 
          {/* Battery */}
          <Section title={t.battery} isRTL={isRTL} theme={theme}>
            <Slider label={t.capacity} value={battery} min={10} max={100} step={0.1} unit=" kWh" onChange={setBattery} accent={theme.yellow} theme={theme} />
            <Slider label={t.startSOC} value={startSOC} min={0} max={99} step={1} unit="%" onChange={v => setStartSOC(Math.min(v, endSOC - 1))} accent={theme.orange} theme={theme} />
            <Slider label={t.endSOC} value={endSOC} min={1} max={100} step={1} unit="%" onChange={v => setEndSOC(Math.max(v, startSOC + 1))} accent={theme.yellow} theme={theme} />
            <Slider label={t.efficiency} value={efficiency} min={70} max={100} step={1} unit="%" onChange={setEfficiency} accent={theme.purple} theme={theme} />
          </Section>
 
          {/* Tariff */}
          <Section title={t.tariff} isRTL={isRTL} theme={theme}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem", marginBottom: "1rem" }}>
              {t.rateLabels.map(r => {
                const active = r.value !== null
                  ? !customRate && Math.abs(rate - r.value) < 0.001
                  : customRate;
                return (
                  <button key={r.label} onClick={() => {
                    if (r.value !== null) { setCustomRate(false); setRate(r.value); }
                    else setCustomRate(true);
                  }} style={{
                    padding: "0.3rem 0.55rem", fontSize: "0.65rem",
                    background: active ? theme.rateActiveBg : theme.rateInactiveBg,
                    color: active ? theme.rateActiveText : theme.rateInactiveText,
                    border: `1px solid ${active ? theme.rateActiveBg : theme.rateInactiveBorder}`,
                    borderRadius: "6px", cursor: "pointer",
                    fontFamily: t.fontFamily,
                    fontWeight: active ? 700 : 400, transition: "all 0.15s",
                  }}>
                    {r.label}{r.value !== null ? ` (${r.value})` : ""}
                  </button>
                );
              })}
            </div>
 
            {customRate && (
              <div style={{ marginBottom: "1rem" }}>
                <div style={{ fontSize: "0.68rem", color: theme.textFaint, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: "0.4rem" }}>{t.rateInput}</div>
                <input type="number" step="0.01" min="0.01" max="1" value={rate}
                  onChange={e => setRate(Number(e.target.value))}
                  style={{ width: "100%", background: theme.inputBg, border: `1px solid ${theme.inputBorder}`, borderRadius: "8px", padding: "0.6rem 0.8rem", color: theme.text, fontFamily: "'DM Mono', monospace", fontSize: "1rem" }} />
              </div>
            )}
 
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "0.5rem" }}>
              <span style={{ fontSize: "0.65rem", color: theme.textFaint }}>{t.activeRate}</span>
              <span style={{ fontSize: "1.1rem", fontWeight: 700, color: theme.yellowText, fontFamily: "'DM Mono', monospace" }}>QAR {rate.toFixed(3)} / kWh</span>
            </div>
          </Section>
 
          {/* Schedule */}
          <Section title={t.schedule} isRTL={isRTL} theme={theme}>
            <Slider label={t.chargeEvery} value={freqDays} min={1} max={14} step={1} unit={t.days} onChange={setFreqDays} accent={theme.green} theme={theme} />
            <div style={{ fontSize: "0.72rem", color: theme.textFaint, marginTop: "-0.8rem", textAlign: isRTL ? "right" : "left" }}>
              = {chargesPerMonth} {t.chargesPerMonth}
            </div>
          </Section>
 
          {/* Breakdown */}
          <Section title={t.breakdown} isRTL={isRTL} theme={theme}>
            {[
              [t.chargeRange, `${startSOC}% → ${endSOC}% (${chargePct}%)`],
              [t.energyBattery, `${energyToBattery.toFixed(2)} kWh`],
              [t.energyWall, `${energyFromWall.toFixed(2)} kWh`],
              [t.charger, `${charger.label} (${charger.kw} kW)`],
              [t.estTime, chargingTime],
              [t.costCharge, `QAR ${costPerCharge.toFixed(3)}`],
              [t.chargesMonth, `${chargesPerMonth}`],
              [t.monthlyCost, `QAR ${monthlyCost.toFixed(2)}`],
              [t.annualCost, `QAR ${annualCost.toFixed(2)}`],
            ].map(([k, v]) => (
              <div key={k} style={{
                display: "flex",
                flexDirection: isRTL ? "row-reverse" : "row",
                justifyContent: "space-between",
                padding: "0.5rem 0", borderBottom: `1px solid ${theme.borderSubtle}`
              }}>
                <span style={{ fontSize: "0.72rem", color: theme.textFaint }}>{k}</span>
                <span style={{ fontSize: "0.78rem", color: theme.textMuted, fontWeight: 500, fontFamily: "'DM Mono', monospace" }}>{v}</span>
              </div>
            ))}
          </Section>
 
          {/* Footer */}
          <div style={{ textAlign: "center", marginTop: "1.4rem", paddingBottom: "1.5rem" }}>
            <div style={{ fontSize: "0.6rem", color: theme.textGhost, letterSpacing: "0.08em", marginBottom: "0.5rem", fontFamily: "'DM Mono', monospace" }}>
              {t.offlineBadge}
            </div>
            <div style={{ fontSize: "0.68rem", color: theme.textVeryFaint, fontFamily: t.fontFamily }}>
              {t.madeBy} <span style={{ color: theme.yellowText }}>@aksharawi</span> · {t.rights}
            </div>
            <div style={{ fontSize: "0.6rem", color: theme.textGhost, letterSpacing: "0.1em", marginTop: "0.4rem", fontFamily: "'DM Mono', monospace" }}>
              v{VERSION}
            </div>
          </div>
        </div>
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
 
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
