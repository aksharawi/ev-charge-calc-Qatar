    function Slider({ label, value, min, max, step, unit, onChange, accent, theme }) {
      const [inputVal, setInputVal] = useState(String(value));
      const pct = ((value - min) / (max - min)) * 100;

      useEffect(() => { setInputVal(String(value)); }, [value]);

      return (
        <div style={{ marginBottom: "1.4rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
            <span style={{ fontSize: "0.72rem", color: theme.textFaint, letterSpacing: "0.05em", textTransform: "uppercase" }}>{label}</span>
            <div style={{ display: "flex", alignItems: "center", gap: "0.2rem" }}>
              <input
                type="number" value={inputVal} min={min} max={max} step={step}
                onChange={e => setInputVal(e.target.value)}
                onBlur={() => {
                  const parsed = parseFloat(inputVal);
                  if (!isNaN(parsed)) { const c = Math.min(max, Math.max(min, parsed)); onChange(c); setInputVal(String(c)); }
                  else setInputVal(String(value));
                }}
                onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
                style={{
                  width: "58px", background: theme.inputBg,
                  border: `1px solid ${alpha(accent, 0.25)}`, borderRadius: "6px",
                  padding: "0.2rem 0.4rem", color: theme.text,
                  fontFamily: "'DM Mono', monospace",
                  fontSize: "0.88rem", fontWeight: 700,
                  textAlign: "center", outline: "none",
                }}
              />
              <span style={{ fontSize: "0.75rem", color: theme.textVeryFaint, minWidth: "22px" }}>{unit.trim()}</span>
            </div>
          </div>
          <div style={{ position: "relative", height: "5px", background: theme.sliderTrack, borderRadius: "3px" }}>
            <div style={{
              position: "absolute", left: 0, top: 0, height: "100%",
              width: `${pct}%`, background: accent, borderRadius: "3px", transition: "width 0.1s"
            }} />
            <input type="range" min={min} max={max} step={step} value={value}
              onChange={e => onChange(Number(e.target.value))}
              style={{ position: "absolute", top: "-8px", left: 0, width: "100%", height: "22px", opacity: 0, cursor: "pointer", zIndex: 2 }} />
            <div style={{
              position: "absolute", top: "50%", left: `${pct}%`,
              transform: "translate(-50%, -50%)",
              width: "15px", height: "15px", background: accent,
              borderRadius: "50%", border: `2px solid ${theme.thumbBorder}`,
              boxShadow: `0 0 10px ${alpha(accent, 0.4)}`,
              transition: "left 0.1s", pointerEvents: "none"
            }} />
          </div>
        </div>
      );
    }

    function TooltipBody({ body, theme, isRTL }) {
      // Parse body into structured blocks (paragraphs + bullet lists)
      const lines = body.split("\n").map(l => l.trim()).filter(Boolean);

      // Group into blocks: consecutive bullet lines = list, others = paragraph
      const blocks = [];
      let currentList = null;
      lines.forEach(line => {
        if (line.startsWith("•")) {
          if (!currentList) {
            currentList = { type: "list", items: [] };
            blocks.push(currentList);
          }
          currentList.items.push(line.replace(/^•\s*/, ""));
        } else {
          currentList = null;
          blocks.push({ type: "para", text: line });
        }
      });

      // Render inline bold (text between em-dash + bold word at start)
      // Pattern: "Wall Plug (2.2 kW) — desc"  →  bold the part before the em-dash
      const renderItem = (text) => {
        const dashMatch = text.match(/^(.+?)\s+—\s+(.*)$/);
        if (dashMatch) {
          return (
            <>
              <span style={{ color: theme.text, fontWeight: 700 }}>{dashMatch[1]}</span>
              <span style={{ color: theme.textMuted }}> — {dashMatch[2]}</span>
            </>
          );
        }
        return <span style={{ color: theme.textMuted }}>{text}</span>;
      };

      return (
        <div style={{
          fontSize: "0.86rem",
          textAlign: isRTL ? "right" : "left",
        }}>
          {blocks.map((block, i) => {
            if (block.type === "para") {
              return (
                <p key={i} style={{
                  color: theme.textMuted,
                  lineHeight: 1.7,
                  marginBottom: i < blocks.length - 1 ? "1rem" : 0,
                }}>
                  {block.text}
                </p>
              );
            }
            // List
            return (
              <ul key={i} style={{
                listStyle: "none",
                padding: 0,
                margin: i < blocks.length - 1 ? "0 0 1rem 0" : 0,
                display: "flex",
                flexDirection: "column",
                gap: "0.85rem",
              }}>
                {block.items.map((item, j) => (
                  <li key={j} style={{
                    display: "flex",
                    alignItems: "flex-start",
                    gap: "0.6rem",
                    lineHeight: 1.65,
                  }}>
                    <span style={{
                      color: theme.yellow,
                      fontWeight: 700,
                      flexShrink: 0,
                      marginTop: "1px",
                    }}>•</span>
                    <span style={{ flex: 1 }}>{renderItem(item)}</span>
                  </li>
                ))}
              </ul>
            );
          })}
        </div>
      );
    }

    function CountryModal({ open, onClose, onSelect, currentCountry, lang, theme }) {
      const [searchQuery, setSearchQuery] = useState("");

      // Reset search when modal closes
      useEffect(() => {
        if (!open) setSearchQuery("");
      }, [open]);

      if (!open) return null;
      const isRTL = lang === "ar";
      const t = STRINGS[lang];

      // Filter and sort countries based on search
      const filteredCountries = Object.entries(COUNTRIES)
        .filter(([code, c]) => {
          if (!searchQuery.trim()) return true;
          const q = searchQuery.toLowerCase().trim();
          return (
            c.name.en.toLowerCase().includes(q) ||
            c.name.ar.includes(searchQuery.trim()) ||
            c.currency.toLowerCase().includes(q) ||
            code.toLowerCase().includes(q)
          );
        })
        .sort((a, b) => a[1].name[lang].localeCompare(b[1].name[lang]));

      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, background: theme.modalBg,
          display: "flex", alignItems: "center", justifyContent: "center",

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: "0.9rem", fontWeight: 700, color: "#fff",
                  marginBottom: "0.2rem",
                }}>{t.installToastTitle}</div>
                <div style={{
                  fontSize: "0.72rem", color: "#aaa", lineHeight: 1.4,
                }}>{t.installToastSub}</div>
              </div>
              <button
                onClick={onDismiss}
                aria-label={t.close}
                style={{
                  background: "transparent", border: "none",
                  color: "#888", fontSize: "1.4rem",
                  cursor: "pointer", padding: 0,
                  lineHeight: 1, flexShrink: 0,
                  width: "24px", height: "24px",
                }}
              >×</button>
            </div>

            {/* Buttons */}
            <div style={{
              display: "flex",
              alignItems: "center", justifyContent: "space-between",
              gap: "0.7rem",
            }}>
              <button
                onClick={onDismiss}
                style={{
                  background: "transparent", border: "none",
                  color: "#888", fontSize: "0.78rem",
                  cursor: "pointer", padding: "0.5rem 0.2rem",
                  fontFamily: t.fontFamily, fontWeight: 500,
                }}
              >{t.notNow}</button>
              <button
                onClick={onInstall}
                style={{
                  background: theme.yellow, color: "#000",
                  border: "none", borderRadius: "8px",
                  padding: "0.6rem 1.4rem",
                  fontSize: "0.78rem", fontWeight: 700,
                  letterSpacing: "0.08em",
                  cursor: "pointer", fontFamily: t.fontFamily,
                }}
              >{t.installButton}</button>
            </div>
          </div>
        </div>
      );
    }

    function IOSInstallModal({ open, onClose, lang, theme }) {
      // Track when modal becomes visible
      useEffect(() => {
        if (open) {
          track("ios_install_modal_shown");
        }
      }, [open]);

      if (!open) return null;
      const t = STRINGS[lang];
      const isRTL = lang === "ar";

      const steps = [
        { num: "1", line1: t.iosStep1Line1, line2: t.iosStep1Line2 },
        { num: "2", line1: t.iosStep2Line1, line2: t.iosStep2Line2 },
        { num: "3", line1: t.iosStep3Line1, line2: t.iosStep3Line2 },
      ];

      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, background: theme.modalBg,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: "1.2rem", zIndex: 999,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: theme.modalCardBg,
            border: `1px solid ${theme.border}`,
            borderRadius: "16px",
            padding: "1.4rem",
            width: "100%", maxWidth: "360px",
            boxShadow: "0 20px 50px rgba(0,0,0,0.4)",
            direction: isRTL ? "rtl" : "ltr",
            fontFamily: t.fontFamily,
            textAlign: isRTL ? "right" : "left",
          }}>
            {/* Header */}
            <div style={{
              display: "flex", justifyContent: "space-between",
              alignItems: "center", marginBottom: "1rem",
              paddingBottom: "1rem",
              borderBottom: `1px solid ${theme.borderSubtle}`,
            }}>
              <div style={{
                display: "flex", alignItems: "center", gap: "0.7rem",
              }}>
                <img src="icon-192.png" alt="" style={{
                  width: "36px", height: "36px",
                  borderRadius: "9px", flexShrink: 0,
                }} />
                <div>
                  <div style={{ fontSize: "0.95rem", fontWeight: 700, color: theme.text }}>
                    {t.iosInstallTitle}
                  </div>
                  <div style={{ fontSize: "0.72rem", color: theme.textFaint, marginTop: "0.1rem" }}>
                    {t.iosInstallSub}
                  </div>
                </div>
              </div>
              <button
                onClick={onClose}
                aria-label={t.close}
                style={{
                  background: "transparent", border: "none",
                  color: theme.textFaint, fontSize: "1.5rem",
                  cursor: "pointer", padding: "0 0.3rem",
                  lineHeight: 1, flexShrink: 0,
                }}
              >×</button>
            </div>

            {/* Steps */}
            <div style={{ display: "flex", flexDirection: "column", gap: "0.9rem" }}>
              {steps.map(s => (
                <div key={s.num} style={{
                  display: "flex",
                  alignItems: "center", gap: "0.85rem",
                }}>
                  <div style={{
                    width: "32px", height: "32px",
                    borderRadius: "50%",
                    background: theme.yellow,
                    color: "#000",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: "0.9rem", fontWeight: 700,
                    flexShrink: 0,
                    fontFamily: "'DM Mono', monospace",
                  }}>{s.num}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{
                      fontSize: "0.86rem", fontWeight: 700, color: theme.text,
                      lineHeight: 1.4,
                    }}>{s.line1}</div>
                    <div style={{
                      fontSize: "0.74rem", color: theme.textFaint,
                      marginTop: "0.15rem", lineHeight: 1.4,
                    }}>{s.line2}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Got it button */}
            <button
              onClick={onClose}
              style={{
                width: "100%", marginTop: "1.4rem",
                background: theme.text, color: theme.modalCardBg,
                border: "none", borderRadius: "10px",
                padding: "0.8rem",
                fontSize: "0.85rem", fontWeight: 700,
                cursor: "pointer", fontFamily: t.fontFamily,
                letterSpacing: "0.04em",
              }}
            >{t.gotIt}</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  MAIN APP
    // ═══════════════════════════════════════════
    function App() {
      const [lang, setLang] = useState("en");
      const [themeName, setThemeName] = useState("light");
      const [country, setCountry] = useState(null);
      const [countryModalOpen, setCountryModalOpen] = useState(false);
      const [battery, setBattery] = useState(31.8);
      const [startSOC, setStartSOC] = useState(20);
      const [endSOC, setEndSOC] = useState(100);
      const [efficiency, setEfficiency] = useState(85);
      const [rate, setRate] = useState(0);
      const [customRate, setCustomRate] = useState(false);
      const [freqDays, setFreqDays] = useState(3);
      const [chargerId, setChargerId] = useState("wall");

      // ── PWA Install state ───────────────────────────────────────
      const [installPromptEvent, setInstallPromptEvent] = useState(null);
      const [isStandalone, setIsStandalone] = useState(false);
      const [isIOS, setIsIOS] = useState(false);
      const [showToast, setShowToast] = useState(false);
      const [showIOSModal, setShowIOSModal] = useState(false);

      const t = STRINGS[lang];
      const isRTL = t.dir === "rtl";
      const theme = THEMES[themeName];
      const isDark = themeName === "dark";

      // ── Install detection (runs once on mount) ─────────────────
      useEffect(() => {
        // 1. Check if running in standalone (already installed)
        const standalone = window.matchMedia("(display-mode: standalone)").matches
          || window.navigator.standalone === true;
        setIsStandalone(standalone);

        // 2. Detect iOS Safari
        const ua = window.navigator.userAgent;
        const ios = /iPhone|iPad|iPod/i.test(ua) && !/CriOS|FxiOS|OPiOS|EdgiOS/.test(ua);
        setIsIOS(ios);

        // 3. Listen for Android/Chrome install prompt
        const handleBeforeInstall = (e) => {
          e.preventDefault();
          setInstallPromptEvent(e);
          track("install_prompt_available");
        };
        window.addEventListener("beforeinstallprompt", handleBeforeInstall);

        // 4. Track installs
        const handleInstalled = () => {
          track("install_completed");
          setInstallPromptEvent(null);
          setShowToast(false);
        };
        window.addEventListener("appinstalled", handleInstalled);

        // 5. Smart toast logic — show on 2nd visit only, not if already installed or dismissed
        if (!standalone) {
          try {
            const dismissed = localStorage.getItem("install_toast_dismissed");
            const visitCount = parseInt(localStorage.getItem("visit_count") || "0", 10) + 1;
            localStorage.setItem("visit_count", String(visitCount));
            // Only show on 2nd visit, and not if previously dismissed within 7 days
            if (visitCount >= 2 && !dismissed) {
              setTimeout(() => {
                setShowToast(true);
                track("install_toast_shown", { visit_count: visitCount });
              }, 1800);  // small delay
            } else if (dismissed) {
              const daysSince = (Date.now() - parseInt(dismissed, 10)) / (1000 * 60 * 60 * 24);
              if (daysSince > 7) {
                localStorage.removeItem("install_toast_dismissed");
              }
            }
          } catch (err) {
            // localStorage might be blocked (incognito) — silently ignore
          }
        }

        return () => {
          window.removeEventListener("beforeinstallprompt", handleBeforeInstall);
          window.removeEventListener("appinstalled", handleInstalled);
        };
      }, []);

      // ── Install handler ─────────────────────────────────────────
      const handleInstallClick = () => {
        track("install_button_click", { source: "header" });
        if (installPromptEvent) {
          // Native Android/Chrome flow
          installPromptEvent.prompt();
          installPromptEvent.userChoice.then((choice) => {
            track("install_prompt_response", { outcome: choice.outcome });
            setInstallPromptEvent(null);
          });
        } else if (isIOS) {
          // iOS doesn't support beforeinstallprompt → show instructions
          setShowIOSModal(true);
        } else {
          // Desktop or unsupported browser → show iOS-style steps as a fallback
          setShowIOSModal(true);
        }
      };

      const handleToastInstall = () => {
        track("install_button_click", { source: "toast" });
        setShowToast(false);
        if (installPromptEvent) {
          installPromptEvent.prompt();
          installPromptEvent.userChoice.then((choice) => {
            track("install_prompt_response", { outcome: choice.outcome });
            setInstallPromptEvent(null);
          });
        } else if (isIOS) {
          setShowIOSModal(true);
        } else {
          setShowIOSModal(true);
        }
      };

      const handleToastDismiss = () => {
        try { localStorage.setItem("install_toast_dismissed", String(Date.now())); } catch {}
        setShowToast(false);
        track("install_toast_dismissed");
      };

      // Should show install button in header? Only if can install AND not already standalone
      const canShowInstallButton = !isStandalone && (installPromptEvent || isIOS);

      // ── Country detection (runs once on mount) ──────────────────
      useEffect(() => {
        let didCancel = false;

        const setDetectedCountry = (code, source) => {
          if (didCancel) return;
          const finalCode = COUNTRIES[code] ? code : FALLBACK_COUNTRY;
          setCountry(finalCode);
          setRate(COUNTRIES[finalCode].def);
          track("country_detected", { country: finalCode, source });
        };

        // Strategy 1: IP geolocation
        fetch("https://ipapi.co/json/")
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => {
            if (didCancel) return;
            const cc = (data && data.country_code) ? data.country_code.toUpperCase() : null;
            if (cc) {
              setDetectedCountry(cc, "ip");
            } else {
              throw new Error("No country in IP response");
            }
          })
          .catch(() => {
            // Strategy 2: browser language
            const browserLocale = navigator.language || navigator.languages?.[0];
            const cc = localeToCountry(browserLocale);
            setDetectedCountry(cc || FALLBACK_COUNTRY, cc ? "locale" : "fallback");
          });

        return () => { didCancel = true; };
      }, []);

      // Sync body bg with theme
      useEffect(() => {
        document.body.style.background = theme.bg;
        document.documentElement.style.background = theme.bg;
        document.body.style.color = theme.text;
      }, [themeName]);

      const CHARGERS = [
        { id: "wall", label: t.wallPlug, sub: "Mode 2 · 2.2 kW", kw: 2.2, icon: "🔌" },
        { id: "ac11", label: t.acCharger, sub: "Type 2 · 11 kW", kw: 11, icon: "⚡" },
      ];

      const charger = CHARGERS.find(c => c.id === chargerId);
      const chargePct = endSOC - startSOC;
      const energyToBattery = (battery * chargePct) / 100;
      const energyFromWall = energyToBattery / (efficiency / 100);
      const costPerCharge = energyFromWall * rate;
      const chargesPerMonth = Math.round(30 / freqDays);
      const monthlyCost = costPerCharge * chargesPerMonth;
      const annualCost = monthlyCost * 12;
      const chargingHours = energyFromWall / charger.kw;
      const chargingTime = chargingHours < 1
        ? `~${Math.round(chargingHours * 60)} ${t.min}`
        : `~${chargingHours.toFixed(1)} ${t.hrs}`;

      const countryData = country ? COUNTRIES[country] : null;

      // Generate rate presets based on detected country
      const ratePresets = countryData ? [
        { key: "low",  label: t.tariffLow,  value: countryData.low },
        { key: "mid",  label: t.tariffMid,  value: countryData.mid },
        { key: "high", label: t.tariffHigh, value: countryData.high },
        { key: "custom", label: t.custom, value: null },
      ] : [];

      const fmt = (amount, decimals) => country ? formatCurrency(amount, country, decimals) : "...";

      return (
        <div style={{
          minHeight: "100vh",
          padding: "env(safe-area-inset-top, 1rem) 1rem 2rem",
          maxWidth: "460px", margin: "0 auto",
          fontFamily: t.fontFamily, direction: t.dir,
          background: theme.bg, color: theme.text,
          transition: "background-color 0.25s ease, color 0.25s ease",
        }}>
          {/* Header */}
          <div style={{ paddingTop: "1.2rem", marginBottom: "1.4rem", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.7rem" }}>
              <img src="icon-192.png" alt="Charge Calculator" style={{ width: "38px", height: "38px", borderRadius: "9px", flexShrink: 0, display: "block" }} />
              <div>
                <div style={{
                  fontFamily: isRTL ? "'Tajawal', sans-serif" : "'Bebas Neue', sans-serif",
                  fontSize: isRTL ? "1.3rem" : "1.5rem",
                  fontWeight: 800, letterSpacing: isRTL ? "0" : "0.05em",
                  color: theme.yellowText, lineHeight: 1
                }}>{t.appTitle}</div>
                <div style={{ fontSize: "0.62rem", color: theme.textVeryFaint, letterSpacing: "0.08em", marginTop: "0.15rem" }}>{t.subtitle}</div>
              </div>
            </div>

            <div style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}>
              {canShowInstallButton && (
                <button
                  onClick={handleInstallClick}
                  aria-label={t.installApp}
                  title={t.installApp}
                  style={{
                    background: theme.yellow,
                    border: `1px solid ${theme.yellow}`,
                    borderRadius: "8px", width: "36px", height: "36px",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: "1rem", color: "#000",
                    cursor: "pointer", flexShrink: 0,
                    boxShadow: `0 0 0 0 ${alpha(theme.yellow, 0.6)}`,
                    animation: "installPulse 2.5s ease-in-out infinite",
                  }}
                >↓</button>
              )}

              <button
                onClick={() => {
                  const newTheme = isDark ? "light" : "dark";
                  setThemeName(newTheme);
                  track("theme_change", { theme: newTheme });
                }}
                aria-label={isDark ? t.themeLight : t.themeDark}
                title={isDark ? t.themeLight : t.themeDark}
                style={{
                  background: theme.cardBgInactive,
                  border: `1px solid ${alpha(theme.yellow, 0.3)}`,
                  borderRadius: "8px", width: "36px", height: "36px",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "1rem", color: theme.yellowText,
                  cursor: "pointer", flexShrink: 0,
                }}
              >{isDark ? "☀" : "☾"}</button>

              <button onClick={() => {
                const newLang = lang === "en" ? "ar" : "en";
                setLang(newLang);
                track("language_change", { language: newLang });
              }} style={{
                background: theme.cardBgInactive,
                border: `1px solid ${alpha(theme.yellow, 0.3)}`,
                borderRadius: "8px", padding: "0.35rem 0.8rem",
                color: theme.yellowText,
                fontFamily: isRTL ? "'DM Mono', monospace" : "'Tajawal', sans-serif",
                fontSize: isRTL ? "0.72rem" : "1rem",
                fontWeight: 700, cursor: "pointer", flexShrink: 0,
                letterSpacing: isRTL ? "0.04em" : "0",
              }}>{t.langToggle}</button>
            </div>
          </div>

          {/* Country pill */}
          <button onClick={() => setCountryModalOpen(true)} style={{
            display: "flex", alignItems: "center", gap: "0.4rem",
            background: theme.cardBg, border: `1px solid ${theme.border}`,
            boxShadow: theme.cardShadow,
            borderRadius: "10px", padding: "0.5rem 0.85rem",
            color: theme.text, fontFamily: t.fontFamily, fontSize: "0.78rem",
            cursor: "pointer", marginBottom: "1.4rem",
          }}>
            <span style={{ fontSize: "0.95rem" }}>📍</span>
            <span style={{ fontWeight: 600 }}>
              {countryData ? countryData.name[lang] : t.detecting}
            </span>
            {countryData && (
              <span style={{ fontSize: "0.7rem", color: theme.textFaint, fontFamily: "'DM Mono', monospace" }}>
                · {countryData.currency}
              </span>
            )}
            <span style={{ marginLeft: isRTL ? 0 : "auto", marginRight: isRTL ? "auto" : 0, color: theme.textFaint, fontSize: "0.7rem" }}>
              {isRTL ? "◂" : "▸"}
            </span>
          </button>

          {/* Result Cards */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.6rem", marginBottom: "1.5rem" }}>
            <div style={{
              gridColumn: "1 / -1", background: theme.accentCardGradient,
              border: `1px solid ${alpha(theme.yellow, isDark ? 0.2 : 0.4)}`,
              boxShadow: theme.cardShadow, borderRadius: "14px",
              padding: "1.4rem 1.5rem", position: "relative", overflow: "hidden",
              textAlign: isRTL ? "right" : "left",
            }}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: `linear-gradient(90deg, transparent, ${theme.yellow}, transparent)` }} />
              <div style={{ fontSize: "0.65rem", color: theme.textFaint, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "0.3rem" }}>{t.costPerCharge}</div>
              <div style={{ fontSize: "2.1rem", fontWeight: 800, color: theme.yellowText, lineHeight: 1, marginBottom: "0.4rem", fontFamily: "'DM Mono', monospace" }}>
                {fmt(costPerCharge, 2)}
              </div>
              <div style={{ fontSize: "0.72rem", color: theme.textMuted, fontFamily: "'DM Mono', monospace" }}>
                {energyFromWall.toFixed(1)} kWh {t.fromWall} · {chargingTime} · {chargePct}% {t.charged}
              </div>
            </div>

            {[
              { label: t.monthly, value: fmt(monthlyCost, 1), sub: `${chargesPerMonth} ${t.charges}`, accent: theme.green },
              { label: t.annual, value: fmt(annualCost, 0), sub: t.estimated, accent: theme.blue },
            ].map(card => (
              <div key={card.label} style={{
                background: theme.cardBg,
                border: `1px solid ${alpha(card.accent, isDark ? 0.1 : 0.2)}`,
                boxShadow: theme.cardShadow, borderRadius: "14px",
                padding: "1rem 1.1rem", position: "relative",
                overflow: "hidden", textAlign: "center"
              }}>
                <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: `linear-gradient(90deg, transparent, ${card.accent}, transparent)` }} />
                <div style={{ fontSize: "0.65rem", color: theme.textFaint, letterSpacing: "0.08em", marginBottom: "0.3rem" }}>{card.label}</div>
                <div style={{ fontSize: "1.2rem", fontWeight: 800, color: card.accent, lineHeight: 1, fontFamily: "'DM Mono', monospace" }}>{card.value}</div>
                <div style={{ fontSize: "0.68rem", color: theme.textVeryFaint, marginTop: "0.25rem" }}>{card.sub}</div>
              </div>
            ))}
          </div>

          {/* Charger Type */}
          <Section title={t.chargerType} isRTL={isRTL} theme={theme} lang={lang} infoTitle={t.tooltipChargerTitle} infoBody={t.tooltipChargerBody}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.6rem" }}>
              {CHARGERS.map(c => {
                const active = chargerId === c.id;
                return (
                  <button key={c.id} onClick={() => {
                    setChargerId(c.id);
                    track("charger_type_select", { charger_type: c.id, charger_kw: c.kw });
                  }} style={{
                    background: active ? theme.chargerCardActive : theme.chargerCardInactive,
                    border: `1.5px solid ${active ? theme.borderActive : theme.border}`,
                    borderRadius: "10px", padding: "0.85rem 0.8rem",
                    cursor: "pointer", textAlign: isRTL ? "right" : "left",
                    transition: "all 0.15s", fontFamily: t.fontFamily,
                  }}>
                    <div style={{ fontSize: "1.3rem", marginBottom: "0.3rem" }}>{c.icon}</div>
                    <div style={{ fontSize: "0.82rem", fontWeight: 700, color: active ? theme.yellowText : theme.textMuted }}>{c.label}</div>
                    <div style={{ fontSize: "0.63rem", color: active ? alpha(theme.yellowText, 0.6) : theme.textFaint, marginTop: "0.15rem", fontFamily: "'DM Mono', monospace" }}>{c.sub}</div>
                  </button>
                );
              })}
            </div>
          </Section>

          {/* Tariff */}
          <Section title={t.tariff} isRTL={isRTL} theme={theme} lang={lang} infoTitle={t.tooltipTariffTitle} infoBody={t.tooltipTariffBody}>
            {countryData ? (
              <>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem", marginBottom: "1rem" }}>
                  {ratePresets.map(r => {
                    const active = r.value !== null
                      ? !customRate && Math.abs(rate - r.value) < 0.0001
                      : customRate;
                    return (
                      <button key={r.key} onClick={() => {
                        if (r.value !== null) {
                          setCustomRate(false); setRate(r.value);
                          track("tariff_select", { tariff_label: r.key, tariff_rate: r.value, country });
                        } else {
                          setCustomRate(true);
                          track("tariff_select", { tariff_label: "Custom", country });
                        }
                      }} style={{
                        padding: "0.4rem 0.7rem", fontSize: "0.7rem",
                        background: active ? theme.rateActiveBg : theme.rateInactiveBg,
                        color: active ? theme.rateActiveText : theme.rateInactiveText,
                        border: `1px solid ${active ? theme.rateActiveBg : theme.rateInactiveBorder}`,
                        borderRadius: "6px", cursor: "pointer",
                        fontFamily: t.fontFamily,
                        fontWeight: active ? 700 : 400, transition: "all 0.15s",
                      }}>
                        {r.label}{r.value !== null ? ` (${r.value})` : ""}
                      </button>
                    );
                  })}
                </div>

                {customRate && (
                  <div style={{ marginBottom: "1rem" }}>
                    <div style={{ fontSize: "0.68rem", color: theme.textFaint, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: "0.4rem" }}>{t.rateInput} ({countryData.currency})</div>
                    <input type="number" step="0.001" min="0.001" max="100" value={rate}
                      onChange={e => setRate(Number(e.target.value))}
                      onBlur={e => track("custom_rate_set", { rate: Number(e.target.value), country })}
                      style={{ width: "100%", background: theme.inputBg, border: `1px solid ${theme.inputBorder}`, borderRadius: "8px", padding: "0.6rem 0.8rem", color: theme.text, fontFamily: "'DM Mono', monospace", fontSize: "1rem" }} />
                  </div>
                )}

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "0.5rem" }}>
                  <span style={{ fontSize: "0.65rem", color: theme.textFaint }}>{t.activeRate}</span>
                  <span style={{ fontSize: "1rem", fontWeight: 700, color: theme.yellowText, fontFamily: "'DM Mono', monospace" }}>{fmt(rate, 3)} / kWh</span>
                </div>
              </>
            ) : (
              <div style={{ textAlign: "center", color: theme.textFaint, padding: "1rem", fontSize: "0.85rem" }}>{t.detecting}</div>
            )}
          </Section>

          {/* Battery */}
          <Section title={t.battery} isRTL={isRTL} theme={theme} lang={lang} infoTitle={t.tooltipBatteryTitle} infoBody={t.tooltipBatteryBody}>
            <Slider label={t.capacity} value={battery} min={10} max={150} step={0.1} unit=" kWh" onChange={setBattery} accent={theme.yellow} theme={theme} />
            <Slider label={t.startSOC} value={startSOC} min={0} max={99} step={1} unit="%" onChange={v => setStartSOC(Math.min(v, endSOC - 1))} accent={theme.orange} theme={theme} />
            <Slider label={t.endSOC} value={endSOC} min={1} max={100} step={1} unit="%" onChange={v => setEndSOC(Math.max(v, startSOC + 1))} accent={theme.yellow} theme={theme} />
            <Slider label={t.efficiency} value={efficiency} min={70} max={100} step={1} unit="%" onChange={setEfficiency} accent={theme.purple} theme={theme} />
          </Section>

          {/* Schedule */}
          <Section title={t.schedule} isRTL={isRTL} theme={theme} lang={lang} infoTitle={t.tooltipScheduleTitle} infoBody={t.tooltipScheduleBody}>
            <Slider label={t.chargeEvery} value={freqDays} min={1} max={14} step={1} unit={t.days} onChange={setFreqDays} accent={theme.green} theme={theme} />
            <div style={{ fontSize: "0.72rem", color: theme.textFaint, marginTop: "-0.8rem", textAlign: isRTL ? "right" : "left" }}>
              = {chargesPerMonth} {t.chargesPerMonth}
            </div>
          </Section>

          {/* Breakdown */}
          <Section title={t.breakdown} isRTL={isRTL} theme={theme}>
            {[
              [t.chargeRange, `${startSOC}% → ${endSOC}% (${chargePct}%)`],
              [t.energyBattery, `${energyToBattery.toFixed(2)} kWh`],
              [t.energyWall, `${energyFromWall.toFixed(2)} kWh`],
              [t.charger, `${charger.label} (${charger.kw} kW)`],
              [t.estTime, chargingTime],
              [t.costCharge, fmt(costPerCharge, 3)],
              [t.chargesMonth, `${chargesPerMonth}`],
              [t.monthlyCost, fmt(monthlyCost, 2)],
              [t.annualCost, fmt(annualCost, 2)],
            ].map(([k, v]) => (
              <div key={k} style={{
                display: "flex",
                justifyContent: "space-between",
                padding: "0.5rem 0", borderBottom: `1px solid ${theme.borderSubtle}`
              }}>
                <span style={{ fontSize: "0.72rem", color: theme.textFaint }}>{k}</span>
                <span style={{ fontSize: "0.78rem", color: theme.textMuted, fontWeight: 500, fontFamily: "'DM Mono', monospace" }}>{v}</span>
              </div>
            ))}
          </Section>

          {/* Footer */}
          <div style={{ textAlign: "center", marginTop: "1.4rem", paddingBottom: "1.5rem" }}>
            <div style={{ fontSize: "0.6rem", color: theme.textGhost, letterSpacing: "0.08em", marginBottom: "0.5rem", fontFamily: "'DM Mono', monospace" }}>
              {t.offlineBadge}
            </div>
            <div style={{ fontSize: "0.68rem", color: theme.textVeryFaint, fontFamily: t.fontFamily }}>
              {t.madeBy} <span style={{ color: theme.yellowText }}>@aksharawi</span> · {t.rights}
            </div>
            <div style={{ fontSize: "0.6rem", color: theme.textGhost, letterSpacing: "0.1em", marginTop: "0.4rem", fontFamily: "'DM Mono', monospace" }}>
              v{VERSION}
            </div>
          </div>

          {/* Country selection modal */}
          <CountryModal
            open={countryModalOpen}
            onClose={() => setCountryModalOpen(false)}
            onSelect={(code) => {
              setCountry(code);
              setRate(COUNTRIES[code].def);
              setCustomRate(false);
              track("country_change", { country: code });
            }}
            currentCountry={country}
            lang={lang}
            theme={theme}
          />

          {/* PWA install toast (smart, 2nd visit) */}
          <InstallToast
            open={showToast}
            onInstall={handleToastInstall}
            onDismiss={handleToastDismiss}
            lang={lang}
            theme={theme}
          />

          {/* iOS install instructions modal */}
          <IOSInstallModal
            open={showIOSModal}
            onClose={() => setShowIOSModal(false)}
            lang={lang}
            theme={theme}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>

</body>
</html>
